# Self-hosted Windows: не используйте actions/setup-python — ему нужны права на HKLM.
# Установите Python 3.11+ в систему и убедитесь, что команды python / py доступны в PATH.
# Линтер запускается через cmd (на Windows bash от GHA часто ломает путь к временному .sh).

name: FastAPI CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: [self-hosted, windows, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python version
        run: python --version

      - name: Build and Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest bandit
          python -m compileall -q .

      - name: Docker image build
        run: docker build -t fastapi-app:ci .

      - name: Run Linter
        shell: cmd
        run: |
          ruff check . --output-format=json 1> linter-report.json
          if errorlevel 1 exit /b 1

      - name: Run Tests
        env:
          CI_SKIP_STARTUP: "1"
        run: pytest --junitxml=pytest-report.xml -v

      - name: Security Scan
        continue-on-error: true
        run: bandit -c bandit.yaml -r . -f json -o bandit-report.json

      - name: Export OpenAPI schema
        run: python -c "import json; from main import app; json.dump(app.openapi(), open('openapi.json', 'w', encoding='utf-8'), indent=2, ensure_ascii=False)"

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: |
            linter-report.json
            pytest-report.xml
            bandit-report.json
            openapi.json
