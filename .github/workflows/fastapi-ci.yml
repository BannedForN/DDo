name: FastAPI CI Pipeline

on:
  push:
    branches: [ main, master ] # добавил master на всякий случай

jobs:
  build-and-test:
    # Проверьте, что в настройках раннера на сайте 
    # в колонке Labels написано именно "self-hosted"
    runs-on: [self-hosted, windows, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build and Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest bandit httpx
          python -m compileall .

      - name: Run Linter
        run: ruff check . --output-format=json -o linter-report.json
        continue-on-error: true

      - name: Run Tests
        run: pytest --junitxml=pytest-report.xml || echo "No tests"

      - name: Security Scan
        run: bandit -r . -f json -o bandit-report.json
        continue-on-error: true

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            linter-report.json
            pytest-report.xml
            bandit-report.json